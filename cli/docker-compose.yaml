services:
  app:
    container_name: deer-flow-cli
    image: deer-flow-cli
    build:
      context: ..
      dockerfile: cli/Dockerfile
    volumes:
      - ..:/deer-flow
      - .tiktoken_cache:/root/.tiktoken_cache:ro
    environment:
      - TIKTOKEN_CACHE_DIR=/root/.tiktoken_cache
    env_file:
      - ../.env
    command: ["tail", "-f", "/dev/null"]